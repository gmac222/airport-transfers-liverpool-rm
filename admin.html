    <style>
        :root {
            --navy: #0E2747;
            --navy-2: #14345c;
            --navy-ink: #0B1E37;
            --amber: #E6B24B;
            --amber-deep: #C7932F;
            --cream: #FAF7F2;
            --cream-2: #F3EEE4;
            --line: #E8E2D4;
            --ink: #1a1d24;
            --muted: #5b6472;
            --white: #ffffff;
            --ok: #1f7a4c;
        }

        * { box-sizing: border-box }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--cream);
            font-family: 'Source Sans 3', sans-serif;
            color: var(--ink);
            line-height: 1.5;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .h1, .h2, h3 { font-family: 'Lexend', sans-serif; }

        .header {
            background: var(--navy-ink);
            color: #fff;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { margin: 0; font-size: 20px; }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .loading { text-align: center; padding: 40px; color: var(--muted); }

        /* Make tables scroll horizontally inside their card on small screens
           rather than pushing the page wider than the viewport. */
        body { overflow-x: hidden; }
        .wrap { width: 100%; box-sizing: border-box; }
        .card { max-width: 100%; box-sizing: border-box; }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -8px; /* let the table breathe to the card edge on mobile */
            padding: 0 8px;
        }

        /* Always-visible price inputs in the jobs table — must be unmissable */
        .price-cell {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #fffbeb;
            border: 2px solid var(--amber);
            border-radius: 8px;
            padding: 4px 8px;
            min-width: 90px;
            transition: box-shadow 0.15s ease, border-color 0.15s ease;
        }
        .price-cell.empty {
            background: #fef2f2;
            border-color: #fca5a5;
        }
        .price-cell.saved {
            background: #dcfce7;
            border-color: #16a34a;
        }
        .price-cell:focus-within {
            border-color: var(--amber-deep);
            box-shadow: 0 0 0 3px rgba(230, 178, 75, 0.25);
        }
        .price-cell .currency {
            font-weight: 700;
            color: var(--amber-deep);
            font-size: 14px;
            line-height: 1;
        }
        .price-cell input {
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            font-weight: 700;
            color: var(--navy-ink);
            font-family: inherit;
            width: 100%;
            padding: 4px 0;
            min-width: 50px;
        }
        .price-cell input::placeholder { color: #9ca3af; font-weight: 400; }
        .profit-pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13px;
            min-width: 60px;
            text-align: center;
        }
        .profit-pill.positive { background: #dcfce7; color: #15803d; }
        .profit-pill.zero { background: #f3f4f6; color: #6b7280; }
        .profit-pill.negative { background: #fee2e2; color: #b91c1c; }

        @media (max-width: 768px) {
            .header {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 12px;
                padding: 14px 16px;
            }
            .wrap { padding: 16px 12px; }
            .card { padding: 14px; border-radius: 10px; }
            /* Stop iOS Safari zooming on input focus */
            input, select, textarea { font-size: 16px !important; }
            /* Price cell stays compact on mobile */
            .price-cell { min-width: 80px; padding: 4px 6px; }
            .price-cell input { font-size: 16px; }
        }
    </style>
