<script>
// If an SMS deep-link sent us here with ?ref=..., the booking lives on the
// dispatch dashboard, not the admin panel. Redirect immediately.
(function(){
    try {
        var ref = new URLSearchParams(window.location.search).get('ref');
        if (ref) { window.location.replace('/operator.html?ref=' + encodeURIComponent(ref)); }
    } catch (e) { /* fall through to admin.html */ }
})();
</script>

    <style>
        :root {
            --navy: #0E2747;
            --navy-2: #14345c;
            --navy-ink: #0B1E37;
            --amber: #E6B24B;
            --amber-deep: #C7932F;
            --cream: #FAF7F2;
            --cream-2: #F3EEE4;
            --line: #E8E2D4;
            --ink: #1a1d24;
            --muted: #5b6472;
            --white: #ffffff;
            --ok: #1f7a4c;
        }

        * { box-sizing: border-box }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--cream);
            font-family: 'Source Sans 3', sans-serif;
            color: var(--ink);
            line-height: 1.5;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .h1, .h2, h3 { font-family: 'Lexend', sans-serif; }

        .header {
            background: var(--navy-ink);
            color: #fff;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { margin: 0; font-size: 20px; }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .loading { text-align: center; padding: 40px; color: var(--muted); }

        @media (max-width: 600px) {
            .header {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 12px;
            }
        }
    </style>
