    <style>
        :root {
            --navy: #0E2747;
            --navy-2: #14345c;
            --navy-ink: #0B1E37;
            --amber: #E6B24B;
            --amber-deep: #C7932F;
            --cream: #FAF7F2;
            --cream-2: #F3EEE4;
            --line: #E8E2D4;
            --ink: #1a1d24;
            --muted: #5b6472;
            --white: #ffffff;
            --ok: #1f7a4c;
        }

        * {
            box-sizing: border-box
        }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--cream);
            font-family: 'Source Sans 3', sans-serif;
            color: var(--ink);
            line-height: 1.5;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .h1, .h2, h3 { font-family: 'Lexend', sans-serif; }

        .header {
            background: var(--navy-ink);
            color: #fff;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
        }

        .wrap {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .jobs-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 700px) {
            .jobs-grid { grid-template-columns: 1fr 1fr; }
        }

        .job-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--line);
        }

        .job-ref {
            font-weight: 700;
            font-size: 18px;
            color: var(--navy-ink);
        }

        .badge {
            font-size: 12px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }
        .badge-pending { background: rgba(230, 178, 75, .2); color: var(--amber-deep); }
        .badge-accepted { background: rgba(31, 122, 76, .1); color: var(--ok); }

        .job-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .detail span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .detail strong {
            color: var(--navy-ink);
        }

        .job-actions {
            margin-top: auto;
            display: flex;
            gap: 10px;
        }
        .job-actions input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }
        .job-actions button {
            background: var(--amber);
            border: none;
            border-radius: 8px;
            padding: 0 16px;
            font-weight: 600;
            color: var(--navy-ink);
            cursor: pointer;
            transition: background 0.2s;
        }
        .job-actions button:hover {
            background: var(--amber-deep);
            color: #fff;
        }
        .job-actions button:disabled {
            background: var(--line);
            color: var(--muted);
            cursor: not-allowed;
        }

        .loading { text-align: center; padding: 40px; color: var(--muted); }

    </style>
</head>
