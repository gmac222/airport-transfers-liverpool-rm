<!doctype html>
<html lang="en-GB">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Driver Portal | RM Transfers</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="./assets/logo.png" />
    <link rel="apple-touch-icon" href="./assets/logo.png" />
    <meta name="theme-color" content="#0B1E37" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --navy: #0E2747;
            --navy-2: #14345c;
            --navy-ink: #0B1E37;
            --amber: #E6B24B;
            --amber-deep: #C7932F;
            --cream: #FAF7F2;
            --cream-2: #F3EEE4;
            --line: rgba(255, 255, 255, 0.1);
            --ink: #ffffff;
            --muted: rgba(255, 255, 255, 0.6);
            --white: #ffffff;
            --ok: #10b981;
            --bg: #091321;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0;
            background: #091321;
            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .aurora-bg-wrapper {
            position: fixed; inset: 0; overflow: hidden;
            pointer-events: none; z-index: -1;
        }

        .aurora-effect {
            --aurora: repeating-linear-gradient(100deg, var(--cream) 10%, #eaf0f6 15%, #dce6f0 20%, var(--cream-2) 25%, var(--cream) 30%);
            --white-gradient: repeating-linear-gradient(100deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.8) 7%, transparent 10%, transparent 12%, rgba(255,255,255,0.8) 16%);
            background-image: var(--white-gradient), var(--aurora);
            background-size: 300% 300%;
            background-position: 50% 50%, 50% 50%;
            filter: blur(25px);
            position: absolute;
            top: -15px; right: -15px; bottom: -15px; left: -15px;
            opacity: 0.3;
            will-change: transform;
        }

        .aurora-effect::after {
            content: ""; position: absolute; inset: 0;
            background-image: var(--white-gradient), var(--aurora);
            background-size: 200% 200%;
            background-attachment: fixed;
            mix-blend-mode: overlay;
            animation: aurora-anim 180s linear infinite;
        }

        @keyframes aurora-anim {
            0% { background-position: 50% 50%, 50% 50%; }
            50% { background-position: 350% 150%, 350% 150%; }
            100% { background-position: 50% 50%, 50% 50%; }
        }

        h1, h2, h3, .brand { font-family: 'Lexend', sans-serif; }

        .wrap {
            max-width: 560px;
            margin: 0 auto;
            padding: 32px 18px 80px;
        }

        .brand {
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 24px;
            color: #fff;
        }

        .brand img { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)); }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            overflow: hidden;
        }

        .card-header {
            padding: 28px 26px 18px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(to bottom, rgba(255,255,255,0.02), transparent);
        }

        .card-header h1 { margin: 0; font-size: 22px; font-weight: 700; }
        .card-header p { color: var(--muted); margin: 6px 0 0; font-size: 14px; }

        .card-body { padding: 26px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 16px;
            margin-bottom: 16px;
            font-family: inherit;
        }

        .input:focus {
            outline: none;
            border-color: var(--amber);
            background: rgba(255,255,255,0.06);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 52px;
            padding: 0 20px;
            border-radius: 14px;
            border: 0;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            width: 100%;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--amber), var(--amber-deep));
            color: var(--navy-ink);
            box-shadow: 0 10px 20px -10px rgba(230, 178, 75, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .btn-primary:hover { transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(1px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: rgba(255,255,255,0.06);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid rgba(255,255,255,0.1);
            height: 44px;
            font-size: 14px;
        }

        .btn-ghost:hover { color: #fff; }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        /* Header bar (logged in) */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
        }

        .topbar .who { font-size: 14px; }
        .topbar .who strong { display: block; font-size: 16px; }
        .topbar .who span { color: var(--muted); font-size: 12px; }

        /* Job cards */
        .jobs { display: flex; flex-direction: column; gap: 14px; }

        .job {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            overflow: hidden;
        }

        .job-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: linear-gradient(to bottom, rgba(255,255,255,0.03), transparent);
        }

        .job-ref {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--amber);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }

        .pill-pending { background: rgba(230,178,75,0.12); color: var(--amber); }
        .pill-accepted { background: rgba(16,185,129,0.12); color: var(--ok); }
        .pill-paid { background: rgba(99,102,241,0.15); color: #a5b4fc; }

        .job-body { padding: 16px 18px; }

        .row {
            display: grid;
            grid-template-columns: 90px 1fr;
            gap: 8px;
            padding: 8px 0;
            font-size: 14px;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }

        .row:last-child { border-bottom: 0; }

        .row .k {
            color: var(--muted);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.06em;
            font-weight: 600;
            padding-top: 2px;
        }

        .row .v { color: #fff; font-weight: 500; word-break: break-word; }

        .job-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 14px 18px 18px;
        }

        .job-actions .btn { height: 44px; font-size: 14px; }

        .job-actions .btn.full { grid-column: 1 / -1; }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }

        .empty .big { font-size: 42px; margin-bottom: 8px; }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--amber);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }
    </style>

    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RM Drivers" />
</head>
