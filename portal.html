    <style>
        :root {
            --navy: #0E2747;
            --navy-2: #14345c;
            --navy-ink: #0B1E37;
            --amber: #E6B24B;
            --amber-deep: #C7932F;
            --cream: #FAF7F2;
            --cream-2: #F3EEE4;
            --line: rgba(255, 255, 255, 0.1);
            --ink: #ffffff;
            --muted: rgba(255, 255, 255, 0.6);
            --white: #ffffff;
            --ok: #10b981;
            --bg: #091321;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: #091321;
            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            font-feature-settings: "ss01", "cv11";
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ---------- AURORA BACKGROUND ---------- */
        .aurora-bg-wrapper {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
        }

        .aurora-effect {
            --aurora: repeating-linear-gradient(100deg, var(--cream) 10%, #eaf0f6 15%, #dce6f0 20%, var(--cream-2) 25%, var(--cream) 30%);
            --white-gradient: repeating-linear-gradient(100deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.8) 7%, transparent 10%, transparent 12%, rgba(255,255,255,0.8) 16%);
            
            background-image: var(--white-gradient), var(--aurora);
            background-size: 300% 300%;
            background-position: 50% 50%, 50% 50%;
            filter: blur(25px);
            
            position: absolute;
            top: -15px;
            right: -15px;
            bottom: -15px;
            left: -15px;
            opacity: 0.3; /* Adjusted for portal */
            will-change: transform;
        }

        .aurora-effect::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: var(--white-gradient), var(--aurora);
            background-size: 200% 200%;
            background-attachment: fixed;
            mix-blend-mode: overlay;
            animation: aurora-anim 180s linear infinite;
        }

        @keyframes aurora-anim {
            0% { background-position: 50% 50%, 50% 50%; }
            50% { background-position: 350% 150%, 350% 150%; }
            100% { background-position: 50% 50%, 50% 50%; }
        }

        .mono {
            font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
        }

        .h1, .h2, .brand, h3, .price-card .amt {
            font-family: 'Lexend', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .wrap {
            max-width: 500px; /* Mobile focused max-width */
            margin: 0 auto;
            padding: 40px 20px;
        }

        .brand {
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 30px;
        }

        .brand img {
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        /* Portal Specific Styles */
        .portal-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 28px;
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .portal-header {
            padding: 32px 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(to bottom, rgba(255,255,255,0.02), transparent);
        }

        .portal-header h1 {
            color: #fff;
            margin: 0;
            font-size: 24px;
            font-family: 'Lexend', sans-serif;
            font-weight: 700;
        }

        .portal-header p {
            color: var(--muted);
            margin: 8px 0 0 0;
            font-size: 15px;
        }

        .portal-content {
            padding: 30px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 99px;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 30px;
            width: 100%;
        }

        .status-pending {
            background: rgba(230, 178, 75, 0.1);
            color: var(--amber);
            border: 1px solid rgba(230, 178, 75, 0.2);
            box-shadow: 0 0 20px rgba(230, 178, 75, 0.1);
        }

        .status-accepted {
            background: rgba(16, 185, 129, 0.1);
            color: var(--ok);
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }

        .status-pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: relative;
        }
        
        .status-pulse::after {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-pending .status-pulse { background: var(--amber); }
        .status-pending .status-pulse::after { border: 2px solid var(--amber); }
        .status-accepted .status-pulse { background: var(--ok); }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .grid-details {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        .detail-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 18px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .detail-item span {
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        
        .detail-item strong {
            font-size: 16px;
            color: #fff;
            font-weight: 500;
        }

        .driver-card {
            display: flex;
            align-items: center;
            gap: 18px;
            background: linear-gradient(145deg, rgba(230, 178, 75, 0.1), rgba(230, 178, 75, 0.02));
            padding: 24px;
            border-radius: 20px;
            border: 1px solid rgba(230, 178, 75, 0.3);
            margin-top: 30px;
            box-shadow: 0 10px 30px -10px rgba(230, 178, 75, 0.15);
        }
        
        .driver-card .avatar {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--amber);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ---------- BUTTONS ---------- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 56px;
            padding: 0 24px;
            border-radius: 16px;
            border: 0;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--amber), var(--amber-deep));
            color: var(--navy-ink);
            box-shadow: 0 10px 20px -10px rgba(230, 178, 75, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            text-shadow: 0 1px 0 rgba(255,255,255,0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px rgba(230, 178, 75, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

    </style>
