<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Action | RM Transfers</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: #0B1E37;
            color: #FAF7F2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }
        img {
            height: 60px;
            margin-bottom: 20px;
        }
        h1 {
            color: #E6B24B;
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        p {
            font-size: 16px;
            color: #A0ABB8;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        button {
            background: #E6B24B;
            color: #0B1E37;
            border: none;
            padding: 16px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }
        button:active {
            transform: scale(0.98);
            background: #d4a342;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .success {
            display: none;
            color: #4CAF50;
            font-weight: bold;
            font-size: 20px;
            margin-top: 20px;
        }
        .btn-gold { background: #E6B24B; color: #0B1E37; }
        .btn-gold:active { background: #d4a342; }
        .btn-blue { background: #3B82F6; color: white; }
        .btn-blue:active { background: #2563EB; }
        .btn-green { background: #28a745; color: white; }
        .btn-green:active { background: #218838; }
    </style>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RM Transfers" />
    <link rel="apple-touch-icon" href="/assets/logo.png" />

</head>
<body>
    <div class="card">
        <img src="/assets/logo.png" alt="RM Transfers" />
        <h1 id="title">Driver Actions</h1>
        <p id="subtitle">Select an action below for this booking.</p>
        
        <button id="actionBtn" onclick="notifyCustomer()" class="btn-gold">🚗 I'm On The Way!</button>
        <button id="arrivedBtn" onclick="notifyArrived()" style="display: none; margin-top: 15px;" class="btn-blue">📍 I've Arrived</button>
        <button id="completeBtn" onclick="completeJob()" style="display: none; margin-top: 15px;" class="btn-green">✅ Complete Job</button>
        <div id="successMsg" class="success"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');

        if (!ref) {
            document.getElementById('actionBtn').style.display = 'none';
            document.getElementById('subtitle').innerText = "Invalid link. Missing booking reference.";
        }

        async function sendAction(action, btn, nextStep) {
            btn.disabled = true;
            const origText = btn.innerText;
            btn.innerText = "Sending...";

            try {
                const res = await fetch('/api/driver-action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ref: ref, action: action })
                });
                
                const data = await res.json();
                if (data.success) {
                    btn.style.display = 'none';
                    if (nextStep === 'arrived') {
                        document.getElementById('subtitle').innerText = "Customer notified you're on the way. Tap below when you arrive.";
                        document.getElementById('arrivedBtn').style.display = 'block';
                    } else if (nextStep === 'complete') {
                        document.getElementById('subtitle').innerText = "Customer notified you've arrived. Tap below when the job is done.";
                        document.getElementById('completeBtn').style.display = 'block';
                    } else if (nextStep === 'done') {
                        document.getElementById('subtitle').style.display = 'none';
                        document.getElementById('successMsg').innerText = "✓ Job marked as completed. Nice one!";
                        document.getElementById('successMsg').style.display = 'block';
                        document.getElementById('title').innerText = "Job Complete";
                    }
                } else {
                    alert("Error: " + (data.error || "Something went wrong"));
                    btn.disabled = false;
                    btn.innerText = origText;
                }
            } catch (err) {
                alert("Network error. Check your signal and try again.");
                btn.disabled = false;
                btn.innerText = origText;
            }
        }

        function notifyCustomer() {
            sendAction('on-the-way', document.getElementById('actionBtn'), 'arrived');
        }

        function notifyArrived() {
            sendAction('arrived', document.getElementById('arrivedBtn'), 'complete');
        }

        function completeJob() {
            if (!confirm("Mark this job as completed?")) return;
            sendAction('complete-job', document.getElementById('completeBtn'), 'done');
        }
    </script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('Service Worker registration failed:', err);
          });
        });
      }
    </script>

</body>
</html>
